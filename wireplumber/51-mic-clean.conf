# 51-mic-clean.conf — stable, predictable capture for the FIFINE USB mic.
#
# WirePlumber 0.5.x drop-in (SPA-JSON). Pins the mic to a fixed 48 kHz / S16LE
# and stops it from being suspended when idle, which on USB mics can swallow the
# first fraction of a second of a take (a power-saving artifact).
#
# Install:
#   mkdir -p ~/.config/wireplumber/wireplumber.conf.d
#   cp wireplumber/51-mic-clean.conf ~/.config/wireplumber/wireplumber.conf.d/
#   systemctl --user restart wireplumber
#   wpctl status        # confirm the fifine source is still there
#
# Remove (if anything misbehaves):
#   rm ~/.config/wireplumber/wireplumber.conf.d/51-mic-clean.conf
#   systemctl --user restart wireplumber
#
# NOTE: this machine currently has NO echo-cancel / auto-gain modules loaded, so
# the mic is already "clean." This file is only worth installing if you hit the
# idle-suspend start-clipping, or want the format/rate pinned. It's optional.

monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_input.*fifine.*" }
    ]
    actions = {
      update-props = {
        audio.format            = "S16LE"
        audio.rate              = 48000
        api.alsa.period-size    = 1024
        api.alsa.disable-mmap   = false
        node.pause-on-idle      = false
      }
    }
  }
]
